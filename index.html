<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimu Hakurei</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff4d4d, #ffffff);
            color: #333;
            text-align: center;
        }

        .container {
            padding: 100px 20px;
        }

        h1 {
            font-size: 3rem;
            color: #b30000;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
        }

        .card {
            background: rgba(255,255,255,0.9);
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        button {
            background: #d60000;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
        }

        button:hover {
            background: #a00000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Reimu Hakurei</h1>
            <p>ยินดีต้อนรับสู่เว็บไซต์ของฉัน</p>
            <p>นี่คือหน้าเว็บ HTML ตัวอย่างที่สร้างขึ้นสำหรับ Reimu Hakurei</p>

            <button onclick="showMessage()">
                คลิกที่นี่
            </button>
        </div>
    </div>

    <script>
        function showMessage() {
            alert("สวัสดี Reimu Hakurei!");
        }
    </script>

</body>
</html>
